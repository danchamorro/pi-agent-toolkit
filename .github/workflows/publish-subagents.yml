name: Publish subagents package

on:
  push:
    tags:
      - "subagents-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @danchamorro/pi-subagents
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Publish package
        run: npm publish --access public --provenance
        working-directory: packages/subagents
